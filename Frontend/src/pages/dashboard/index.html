<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminBot | Dashboard</title>
    <link rel="stylesheet" href="../../shared/css/layout.css">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"></div>
                <h2>AdminBot</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="../dashboard/index.html" class="nav-item active">
                    <span>🏠</span> Dashboard
                </a>
                <a href="../students/index.html" class="nav-item">
                    <span>👥</span> Estudiantes
                </a>
                <a href="../attendance/index.html" class="nav-item">
                    <span>📅</span> Asistencia
                </a>
                <a href="../payments/index.html" class="nav-item">
                    <span>💰</span> Pagos
                </a>
                <a href="../alerts/index.html" class="nav-item">
                    <span>🔔</span> Alertas
                </a>
                <a href="../settings/index.html" class="nav-item">
                    <span>⚙️</span> Configuración
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-outline" style="width: 100%;">Cerrar Sesión</button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-layout">
            <header class="top-header">
                <h1 id="welcome-message">Bienvenido</h1>
                <div class="user-profile">
                    <span id="user-name">Usuario</span>
                </div>
            </header>

            <main class="content-body">
                <!-- Stats Grid -->
                <section class="stats-grid">
                    <div class="card stat-card">
                        <h3>Total Estudiantes</h3>
                        <p id="total-students" class="stat-value">...</p>
                    </div>
                    <div class="card stat-card">
                        <h3>Pagos Pendientes</h3>
                        <p id="pending-payments" class="stat-value">...</p>
                    </div>
                    <div class="card stat-card">
                        <h3>Inasistencias Hoy</h3>
                        <p id="absences-today" class="stat-value">...</p>
                    </div>
                    <div class="card stat-card">
                        <h3>Alertas Activas</h3>
                        <p class="stat-value">5</p>
                    </div>
                </section>

                <!-- Charts Section -->
                <section class="charts-section" style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div class="card">
                        <h3>Asistencia Semanal</h3>
                        <canvas id="attendanceChart"></canvas>
                    </div>
                    <div class="card">
                        <h3>Estado de Pagos</h3>
                        <canvas id="paymentsChart"></canvas>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script type="module" src="./dashboard.js"></script>
</body>
</html>
