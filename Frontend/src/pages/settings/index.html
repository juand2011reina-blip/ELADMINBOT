<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminBot | Configuración</title>
    <link rel="stylesheet" href="../../shared/css/layout.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo-icon"></div><h2>AdminBot</h2></div>
            <nav class="sidebar-nav">
                <a href="../dashboard/index.html" class="nav-item"><span>🏠</span> Dashboard</a>
                <a href="../students/index.html" class="nav-item"><span>👥</span> Estudiantes</a>
                <a href="../attendance/index.html" class="nav-item"><span>📅</span> Asistencia</a>
                <a href="../payments/index.html" class="nav-item"><span>💰</span> Pagos</a>
                <a href="../alerts/index.html" class="nav-item"><span>🔔</span> Alertas</a>
                <a href="../settings/index.html" class="nav-item active"><span>⚙️</span> Configuración</a>
            </nav>
        </aside>
        <div class="main-layout">
            <header class="top-header"><h1>Configuración del Sistema</h1></header>
            <main class="content-body">
                <div class="card settings-section">
                    <h3>Mensajes Automáticos</h3>
                    <div class="form-group">
                        <label>Plantilla Inasistencia:</label>
                        <textarea>Hola {acudiente}, te informamos que el estudiante {estudiante} no asistió a clase el día de hoy.</textarea>
                    </div>
                    <div class="form-group">
                        <label>Plantilla Cobro:</label>
                        <textarea>Hola {acudiente}, te recordamos que tienes un pago pendiente de {monto} por el estudiante {estudiante}.</textarea>
                    </div>
                    <button class="btn btn-primary">Guardar Cambios</button>
                </div>
            </main>
        </div>
    </div>
</body>
<script src="setting.js"></script>
</html>
